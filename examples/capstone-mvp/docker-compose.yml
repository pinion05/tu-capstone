services:
  stt-server:
    build: ./stt-server
    ports:
      - "8765:8765"
    environment:
      PORT: 8765

  stt-web:
    build: ./stt-web
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_STT_WS_URL: ws://localhost:8765
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.z.ai/api/coding/paas/v4}
      LLM_MODEL: ${LLM_MODEL:-glm-5-turbo}
    depends_on:
      - stt-server
